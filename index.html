<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Volunteer Matchmaker | Bhupesh Kumar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-800 h-screen flex overflow-hidden">

    <aside class="w-[350px] bg-white border-r border-gray-200 p-6 flex flex-col justify-between hidden md:flex shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10">
        <div>
            <h2 class="text-2xl font-black text-indigo-600 mb-8 flex items-center gap-2 tracking-tight">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" /></svg>
                ImpactHub
            </h2>
            
            <div class="bg-gradient-to-br from-indigo-600 to-blue-700 rounded-2xl p-5 mb-6 text-white shadow-lg">
                <div class="flex items-center gap-4 mb-5">
                    <div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-full flex justify-center items-center text-white text-xl font-bold border border-white/30">BK</div>
                    <div>
                        <h3 class="font-bold text-lg leading-tight">Bhupesh Kumar</h3>
                        <p class="text-[10px] text-indigo-100 font-bold tracking-widest uppercase opacity-80">Platform Founder</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <div class="bg-white/10 backdrop-blur-md p-3 rounded-xl text-center border border-white/10">
                        <p class="text-[9px] font-bold uppercase tracking-widest opacity-70">Impact Score</p>
                        <p class="text-2xl font-black mt-1">450</p>
                    </div>
                    <div class="bg-white/10 backdrop-blur-md p-3 rounded-xl text-center border border-white/10">
                        <p class="text-[9px] font-bold uppercase tracking-widest opacity-70">Hours Logged</p>
                        <p class="text-2xl font-black mt-1">12.5</p>
                    </div>
                </div>
            </div>

            <div>
                <h4 class="font-bold text-gray-400 mb-3 text-[11px] uppercase tracking-wider italic">Profile Focus</h4>
                <div class="flex flex-wrap gap-2 mb-8">
                    <span class="px-3 py-1.5 bg-emerald-50 text-emerald-700 text-[10px] font-black rounded-full border border-emerald-100 uppercase tracking-tighter">🌱 Environment</span>
                    <span class="px-3 py-1.5 bg-blue-50 text-blue-700 text-[10px] font-black rounded-full border border-blue-100 uppercase tracking-tighter">📚 Education</span>
                </div>
            </div>
        </div>
        
        <div class="bg-slate-900 text-white rounded-2xl p-4 text-[10px] font-bold flex items-center justify-between shadow-xl">
            <span class="flex items-center gap-2">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                AI SECURE NODE
            </span>
            <span class="text-slate-500">v2.4.0-STABLE</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#fdfdfd] relative">
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 p-4 px-6 flex items-center justify-between z-10 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex justify-center items-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12.75 6a.75.75 0 00-1.5 0v5.25H6a.75.75 0 000 1.5h6a.75.75 0 00.75-.75V6z" /></svg>
                </div>
                <div>
                    <h1 class="font-black text-gray-900 text-base tracking-tight uppercase">AI Volunteer Matchmaker</h1>
                    <p class="text-[10px] text-emerald-500 font-black tracking-widest uppercase flex items-center gap-1">Live NGO Search Active</p>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="downloadChat()" class="text-[11px] bg-white text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-full border border-gray-200 font-bold transition-all flex items-center gap-1.5 shadow-sm">
                    📥 Download
                </button>
                <button onclick="clearChatHistory()" class="text-[11px] bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-full border border-red-100 font-bold transition-all flex items-center gap-1.5">
                    🗑️ Reset
                </button>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-8 space-y-6 flex flex-col pb-40"></div>

        <footer class="absolute bottom-0 w-full p-6 bg-gradient-to-t from-white via-white to-transparent">
            <div class="max-w-4xl mx-auto">
                <div class="flex gap-2 mb-4 overflow-x-auto pb-2 no-scrollbar">
                    <button onclick="useChip('Find weekend opportunities')" class="shrink-0 px-4 py-2 bg-white border border-gray-200 rounded-full text-[11px] font-bold text-gray-600 hover:border-indigo-400 hover:text-indigo-600 transition-all shadow-sm">🗓️ Weekend Tasks</button>
                    <button onclick="useChip('Help at an animal shelter')" class="shrink-0 px-4 py-2 bg-white border border-gray-200 rounded-full text-[11px] font-bold text-gray-600 hover:border-indigo-400 hover:text-indigo-600 transition-all shadow-sm">🐕 Animal Welfare</button>
                    <button onclick="useChip('Teach underprivileged kids')" class="shrink-0 px-4 py-2 bg-white border border-gray-200 rounded-full text-[11px] font-bold text-gray-600 hover:border-indigo-400 hover:text-indigo-600 transition-all shadow-sm">📚 Education</button>
                </div>

                <form id="chat-form" class="flex gap-3 bg-white p-2 rounded-2xl shadow-2xl border border-gray-100" onsubmit="sendMessage(event)">
                    <input type="text" id="user-input" class="flex-1 bg-transparent text-gray-800 px-6 py-4 outline-none text-sm font-medium" placeholder="Ask anything about volunteering..." autocomplete="off">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white w-14 h-14 rounded-xl flex justify-center items-center shadow-lg transition-transform hover:scale-105 active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z" /></svg>
                    </button>
                </form>
            </div>
        </footer>
    </main>

    <script>
        let chatHistory = JSON.parse(localStorage.getItem('impactChatHistory')) || [];
        const chatBox = document.getElementById("chat-box");

        function renderHistory() {
            chatBox.innerHTML = "";
            if(chatHistory.length === 0) {
                chatBox.innerHTML = `<div class="flex items-start gap-4 animate-fade"><div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 font-bold">AI</div><div class="bg-white border border-gray-100 p-5 rounded-2xl rounded-tl-none shadow-sm text-sm text-gray-700 max-w-[80%] leading-relaxed font-medium">Hello! I am your <b>AI Volunteer Matchmaker</b>. I can help you find NGOs based on your skills and location. What would you like to do today?</div></div>`;
                return;
            }
            chatHistory.forEach(msg => {
                const isUser = msg.role === 'user';
                
                chatBox.innerHTML += `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'} animate-fade">
                    <div class="${isUser ? 'bg-indigo-600 text-white shadow-indigo-200' : 'bg-white text-gray-700 border border-gray-100 shadow-sm whitespace-pre-wrap'} p-5 rounded-2xl ${isUser ? 'rounded-br-none' : 'rounded-tl-none'} text-sm max-w-[80%] shadow-lg leading-relaxed font-medium">
                        ${msg.text}
                    </div>
                </div>`;
            });
            scrollToBottom();
        }

        function useChip(text) {
            document.getElementById('user-input').value = text;
            sendMessage(new Event('submit'));
        }

        function downloadChat() {
            if(chatHistory.length === 0) return alert("Nothing to download!");
            const content = chatHistory.map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'NGO-Chat-Report.txt';
            a.click();
        }

        function clearChatHistory() {
            if(confirm("Wipe all data?")) { localStorage.removeItem('impactChatHistory'); chatHistory = []; renderHistory(); }
        }

        async function sendMessage(event) {
            if(event) event.preventDefault();
            const inputField = document.getElementById("user-input");
            const userText = inputField.value.trim();
            if (!userText) return;

            chatHistory.push({ role: 'user', text: userText });
            localStorage.setItem('impactChatHistory', JSON.stringify(chatHistory));
            renderHistory();
            inputField.value = "";

            try {
                const response = await fetch("https://ai-volunteer-impact.onrender.com/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: "user_session", message: userText })
                });
                const data = await response.json();
                chatHistory.push({ role: 'bot', text: data.reply });
                localStorage.setItem('impactChatHistory', JSON.stringify(chatHistory));
                renderHistory();
            } catch (error) {
                alert("Backend not running on Port 8001!");
            }
        }

        function scrollToBottom() { chatBox.scrollTop = chatBox.scrollHeight; }
        renderHistory();
    </script>
</body>
</html>
